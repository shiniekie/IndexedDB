<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <!-- Mobile View -->
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">

    <!-- CSP -->
    <meta http-equiv="Content-Security-Policy"
        content="default-src * 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline';
                 style-src * 'self' 'unsafe-inline';
                 media-src *;
                 img-src * data: content:;">

    <title>SecureVault</title>

   
    <link rel="stylesheet" href="css/style.css">

    <!-- ICONS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>


<body>

    <div class="header">SecureVault</div>

    <div class="container">
    <div class="card">

        <h2>Login</h2>

        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">

        <button onclick="login()">Login</button>

        <p class="text-center">
            <a href="register.html">Create Account</a>
        </p>

    </div>
</div>

    <!-- Cordova (safe load) -->
    <script>
        if (window.location.protocol !== "file:") {
            document.write('<script src="cordova.js"><\/script>');
        }
    </script>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>

    <script>
        function initPage() {
            if (typeof initDB === "function") {
                initDB();
            }
        }

        document.addEventListener("deviceready", initPage);
        window.onload = initPage;
    </script>

</body>
</html>
